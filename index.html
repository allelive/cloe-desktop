<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloe Desktop</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <!-- Character layer (bottom) -->
  <div id="gif-container">
    <img id="cloe-gif-a" class="cloe-gif-layer" src="/gifs/blink.gif" alt="">
    <img id="cloe-gif-b" class="cloe-gif-layer" src="" alt="">
    <!-- Context usage HUD bar -->
    <div id="context-bar" class="context-bar">
      <div id="context-bar-fill" class="context-bar-fill"></div>
      <span id="context-bar-text" class="context-bar-text">0%</span>
    </div>
  </div>

  <!-- Terminal layer -->
  <div id="terminal-overlay" class="terminal-overlay hidden">
    <div id="terminal-titlebar" class="terminal-titlebar">
      <div class="terminal-traffic-lights">
        <button id="terminal-btn-close" class="traffic-light traffic-close" title="Exit Terminal"></button>
        <button id="terminal-btn-minimize" class="traffic-light traffic-minimize" title="Minimize"></button>
        <button id="terminal-btn-fullscreen" class="traffic-light traffic-fullscreen" title="Fullscreen"></button>
      </div>
      <div class="terminal-drag-region"></div>
    </div>
    <div id="terminal-container" class="terminal-container"></div>
  </div>

  <div id="ws-status" title="WebSocket">●</div>
  <script type="module" src="/src/renderer.js"></script>
</body>
</html>
